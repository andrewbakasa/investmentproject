<div class="modal fade" id="modal_add_model_tankdesignparameters" tabindex="-1" role="dialog"
aria-labelledby="exampleModalLabel" aria-hidden="true" style="overflow-y: auto !important">
<div class="modal-dialog" role="document">
        <div class="modal-content">
            <!--Header-->
            <div class="modal-header">
                <h4 class="modal-title" id="tankdesignparameters_label"> {% if tankdesignparameters_record %} Edit {% else %}  Add {% endif %} Tank Design Parameters: {{usermodel.name}} </h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">×</span>
                </button>
            </div>
            <!--Body-->
            <div class="modal-body">

                        
            <form method="POST" id='form-tankdesignparameters'
                {% if tankdesignparameters_record %} class="model-tankdesignparameters-edit" data-url="{% url 'edit_model_tankdesignparameters_ajax' tankdesignparameters_record.id %}" 
                {% else %}  class="model-tankdesignparameters-add"   data-url="{% url 'add_model_tankdesignparameters_ajax' %}" 
            
                {% endif %} > 
                {% csrf_token %}

                {% include 'fishapp/form_tankdesignparameters.html' %}

            </div> 
            <!--Footer-->
            <div class="modal-footer">
                <button class="btn btn-outline-danger  close-modal" data-dismiss="modal" aria-label="Close"
                    type="reset">Close
                </button>  
                <button class="btn btn-danger" type="submit" id ="submit_tankdesignparameters">Save</button>
            
            </div>
            </form>
        </div>
</div>
</div>
