<div class="box box-profile">
    <div class="box-body" id='taxes_section'>
        <h4 class="box-title" style="color:blue">Taxes</h4>
        <div class="box-description view-section" name='my_taxes_section'>
            {%if taxes_record %}
                <!-- Edit/Change -->
                <div class="table-responsive">
                    <table id="taxesTable" class="table table-striped" >
                        <thead>
                        </thead>
                        <tbody id="taxes-table-tbody">
                            <tr id="taxes-import_duty" >
                                <th scope="row">Import duty</th>
                                <td class="taxesAction taxesData" name="import_duty" >{{taxes_record.import_duty}}</td>                                                    
                            </tr>
                            <tr id="taxes-sales_tax" >
                                <th scope="row">Sales tax</th>
                                <td class="taxesAction taxesData"  name="sales_tax">{{taxes_record.sales_tax}}</td>                                                    
                            </tr>
                            <tr id="taxes-corporate_income_tax" >
                                <th scope="row">Corporate income tax</th>
                                <td class="taxesAction taxesData"  name="corporate_income_tax">{{taxes_record.corporate_income_tax}}</td>                                                    
                            </tr>
                        </tbody>
                    </table>
                </div>
                   <!-- EDIT MODEL -->
                   <a class="model-edit show-form-update" href="#" data-url="{% url 'update_model_taxes_ajax' taxes_record.id %}" 
                   data-target="#modal-edit-product-div" data-toggle="tooltip" data-placement="bottom" 
                   title='Edit Taxes'><i  class="fas fa-edit"></i>
               </a>
            {% else %}
                <!-- Add For First Time -->
                <a class="model-edit show-form-update" href="#" data-url="{% url 'add_model_taxes_ajax2' usermodel.id %}" 
                        data-target="#modal-edit-product-div" data-toggle="tooltip" data-placement="bottom" 
                        title='Add Taxes'><i  class="fas fa-plus"></i>
                    </a>
            {% endif%}
        </div>
    </div>
</div>
