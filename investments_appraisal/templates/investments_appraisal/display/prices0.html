
<div class="accordion-item" id='prices_section_accordion'>

    <h4 class="accordion-header" id="prices_header" >
      <button  id="prices_accordion_button" type="button" 
        {%if price_record %} class="accordion-button section-complete" {% else  %} 
                 class="accordion-button section-incomplete" {% endif %}
         data-toggle="collapse" data-target="#prices_target" aria-expanded="false" aria-controls="prices_target">
       Prices Details
      </button>
    </h4>
     
    
    <div id="prices_target" class="accordion-collapse collapse" aria-labelledby="prices_header" data-parent="#accordionExample">
      <div class="accordion-body card" id='prices_section'>
        <div class="box-description view-section" name='my_prices_section'>
            {%if price_record %}
            <!-- Edit/Change -->
            <div class="table-responsive">
             
                <table id="pricesTable" class="table table-striped" >
                    <thead>
                    </thead>
                    <tbody id="prices-table-tbody">
                        <tr id="prices-title" >
                            <th scope="row">Title</th>
                            <td class="pricesAction pricesData" name="title" >{{price_record.title}}</td>                                                    
                        </tr>
                        <tr id="prices-base-price" >
                            <th scope="row">Base Price(per ton)</th>
                            <td class="pricesAction pricesData"  name="base_price">{{price_record.base_price}}</td>                                                    
                        </tr>
                        <tr id="prices-change-in-price" >
                            <th scope="row">Change In Price (%)</th>
                            <td class="pricesAction pricesData"  name="change_in_price">{{price_record.change_in_price}}</td>                                                    
                        </tr>
                    </tbody>
                </table>
            </div>
            <a href="#" class="btn btn-primary btn-round" data-toggle="modal"
              data-target="#modal_add_model_prices"> <i class="fa fa-edit"></i></a>
        {% else %}
            <!-- Add For First Time -->
            <a href="#" class="btn btn-danger btn-round" data-toggle="modal"
            data-target="#modal_add_model_prices"> <i class="fa fa-plus"></i></a>
        {% endif%}
        </div>
      </div>
    </div>
</div>
