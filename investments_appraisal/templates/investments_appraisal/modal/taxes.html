<div class="modal fade" id="modal_add_model_taxes" tabindex="-1" role="dialog"
                aria-labelledby="exampleModalLabel" aria-hidden="true" style="overflow-y: auto !important">
                <div class="modal-dialog" role="document">
                        <div class="modal-content">
                            <!--Header-->
                            <div class="modal-header">
                                <h4 class="modal-title" id="taxes_label"> {% if taxes_record %} Edit {% else %}  Add {% endif %} taxes: {{usermodel.name | truncatechars:15}} </h4>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">×</span>
                                </button>
                            </div>
                            <!--Body-->
                            <div class="modal-body">

                                        
                            <form method="POST" id='form-taxes'
                                {% if taxes_record %} class="model-taxes-edit" data-url="{% url 'edit_model_taxes_ajax' usermodel.id taxes_record.id %}" 
                                {% else %}  class="model-taxes-add"   data-url="{% url 'add_model_taxes_ajax' usermodel.id %}" 
                            
                                {% endif %} > 
                                {% csrf_token %}
        
                                {% include 'investments_appraisal/form_taxes.html' %}

                            </div> 
                            <!--Footer-->
                            <div class="modal-footer">
                                <button class="btn btn-outline-danger close-modal" data-dismiss="modal" aria-label="Close"
                                    type="reset">Close
                                </button>  
                                <button class="btn btn-danger" type="submit" id ="submit_taxes">Save</button>
                            
                            </div>
                            </form>
                        </div>
                </div>
            </div>
