{% load static %}
<section id="contact" class="contact">
 

  <div class="container" data-aos="fade-up">

    <div class="row mt-5">

      <div class="col-lg-12 mt-5 mt-lg-0">
       
        <form enctype="multipart/form-data" method="POST" class="form-horizontal php-email-form contact-us" data-url="{% url 'purchase_plan_ajax' %}">
          {% csrf_token %}
            <div class="row">
                <div class="col-md-6 form-group">
                  <input type="text" name="name" class="form-control" id="name" placeholder="Your Name" required>
                </div>
                <div class="col-md-6 form-group mt-3 mt-md-0">
                  <input type="email" class="form-control" name="email" id="email" placeholder="Your Email" required value="{{email}}">
                </div>
              </div>
            <div class="form-group mt-3">
                <input type="text" class="form-control" name="userplan" id="userplan" placeholder="UserPlan" required  value="{{user_plan}}">
            </div>
            <div class="form-group mt-3">
              <input type="text" class="form-control" name="number" id="number" placeholder="Number"  >
            </div>
            </br>


            <div class="form-error2 public_toggle_form-errors form-group" style='display:none'>
            </div>
            <div class="text-center"><button type="submit">Submit</button></div>
        </form>

      </div>

    </div>

  </div>
</section><!-- End Contact Section -->
