{% load i18n %}
{% load static %}
{% load tags %}
{% load humanize %}
<!---Removed padding from 70px-- 0px-->
<section style= 'padding: 5px 0;' id="projects" class="projects">
    <div class="container" data-aos="fade-up">
         <!-- ======= Breadcrumbs ======= -->
         <div class="row">
            <ol class="breadcrumb" >
              <li class="breadcrumb-item"><a href="{% url 'index' %}">Home</a></li>
              <li class="breadcrumb-item" ><a href="{% url 'projects' %}">{% trans 'Projects' %}</a></li>
            
              <li class="breadcrumb-item" >
                <label id="total_projects_searched"></label>
              </li>  
            </ol>
          </div>

          <div id="project_div" class="row" data-aos="zoom-in" data-aos-delay="100">
              {% for model in first_page %}
                  <div id="div-{{model.id}}" class="col-lg-4 col-md-6 d-flex align-items-stretch umodels">
                      <div class="project-item umodel-item">
                    
                          <img src ="{% static 'mentor/assets/img/projects/'|add:model.uniqueid|add:'.jpg' %}" class="img-fluid" alt="">
              
                          <div class="project-content">
                              <div class="d-flex justify-content-between align-items-center mb-3">
                                <h4>{{model.name}}</h4>
                              </div>
                              
                              <p><h3><a href="{% url 'project-details' model.id %}">{{model.name}}</a></h3> {{model.description}}</p>
                              <div class="trainer d-flex justify-content-between align-items-center">
                                <div class="trainer-rank d-flex align-items-center">
                                  <i class="bx bx-download"></i>&nbsp;{{model.hits}}
                                </div>
                                <div class="trainer-rank d-flex align-items-center">
                                    <a class="model-likes" href="#" data-url="{% url 'update_model_likes' model.id %}" 
                                      style="color:inherit" data-toggle="tooltip" data-placement="bottom" 
                                      title='Like'><i class="bx bx-heart"></i>&nbsp;{{model.likes}}
                                    </a>
                                </div>
                              </div>
                          </div>
                      </div>
                  </div> <!-- End Project Item-->
              {% endfor %}
          </div>

          Pages
          <div id= "page_section" class="pagination">
            {% for i in page_range %}
            <a class='a_page_nav' style="margin-left: 5px; " href ="{{i}}">{{i}}</a>
            {% endfor %}
          </div>

    </div>
  
</section><!-- End Projects Section -->
