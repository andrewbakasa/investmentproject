{% load static %}
 <!-- ======= Counts Section ======= -->
 <section id="counts" class="counts section-bg">
  <div class="container">

    <div class="row counters">

      <div class="col-lg-3 col-6 text-center">
        <span data-purecounter-start="0" data-purecounter-end="{{downloads_count}}" data-purecounter-duration="1" class="purecounter"></span>
        <p>Downloads</p>
      </div>

      <div class="col-lg-3 col-6 text-center">
        <span data-purecounter-start="0" data-purecounter-end={{models_count}} data-purecounter-duration="1" class="purecounter"></span>
        <p>Models</p>
      </div>

      <div class="col-lg-3 col-6 text-center">
        <span data-purecounter-start="0" data-purecounter-end={{projects_count}} data-purecounter-duration="1" class="purecounter"></span>
        <p>Projects</p>
      </div>

      <div class="col-lg-3 col-6 text-center">
        <span data-purecounter-start="0" data-purecounter-end="15" data-purecounter-duration="1" class="purecounter"></span>
        <p>Experts</p>
      </div>

    </div>

  </div>
</section><!-- End Counts Section -->
