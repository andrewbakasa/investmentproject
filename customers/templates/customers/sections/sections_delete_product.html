{% load i18n %}
{% load static %}
{% load tags %}
{% load humanize %}

{% load widget_tweaks %}
{% load store_extras %}

<!---Removed padding from 70px-- 0px-->
<section style= 'padding: 5px 0;' id="projects" class="projects">
    <div class="container  box-element" data-aos="fade-up">
         <!-- ======= Breadcrumbs ======= -->
         <div class="row">
            <ol class="breadcrumb" >
              <li class="breadcrumb-item" ><a href="{% url 'index' %}" class ="badge rounded-pill bg-success" 
                data-toggle="tooltip" data-placement="bottom" title='Home'><i class="fas fa-home"></i></a></li>
       
              <li class="breadcrumb-item" ><a href="{% url 'store' %}" class ="badge rounded-pill bg-light text-dark" class ="badge rounded-pill bg-success"
                data-toggle="tooltip" data-placement="bottom" title='Shop Goods'>{% trans 'Store' %}</a></li>
              <li class="breadcrumb-item" ><a href="{% url 'products' %}" class ="badge rounded-pill bg-light text-dark">{% trans 'Products' %}</a></li>
    
              <li class="breadcrumb-item" >
                <label id="total_projects_searched">Category</label>
              </li>  
            </ol>
          </div>

     
          <div id="project_div" class="row" data-aos="zoom-in" data-aos-delay="100">
            
              <div class="row">
                <div class="col-md-12">
                    <div class="box">
                        <div class="box-body">
                            <p>Are you sure you want to delete "{{item}}"?</p>
                            <form action="{% url 'delete_product' item.id %}" method="POST">
                                {% csrf_token %}
                                <a class="btn btn-sm btn-warning" href="{% url 'products' %}">Cancel</a>
                                <input class="btn btn-sm  btn-danger" type="submit" name="Confirm">
                            </form>
                        </div>
                    </div>
                  
                </div>
              </div>
          
          </div>

       
    
    </div>
  
</section><!-- End Projects Section -->
